<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 9</title>
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>
    <header>
        <section>
            <div>
                <p>Nome do personagem</p>
                <input type="text" id="nome-personagem">
            </div>
            <div>
                <p>Nome do jogador</p>
                <input type="text" id="nome-jogador">
            </div>
            <div>
                <p>Pontos de experiência</p>
                <input type="text" id="pontos-experiencia">
            </div>
            <div>
                <p>Raça</p>
                <input type="text" id="raca">
            </div>
            <div>
                <p>Clase</p>
                <input type="text" id="classe">
            </div>
            <div>
                <p>Alinhamento</p>
                <input type="text" id="alinhamento">
            </div>
        </section>
    </header>

    <main>
        <section>
            <div>
                <div>
                    <p>FOR</p>
                    <input type="text" id="for">
                </div>
                <div>
                    <p>DES</p>
                    <input type="text" id="des">
                </div>
                <div>
                    <p>CON</p>
                    <input type="text" id="con">
                </div>
                <div>
                    <p>INT</p>
                    <input type="text" id="int">
                </div>
                <div>
                    <p>SAB</p>
                    <input type="text" id="sab">
                </div>
                <div>
                    <p>CAR</p>
                    <input type="text" id="car">
                </div>
            </div>

            <div>
                <div>
                    <div>
                        <p>Vida</p>
                        <input type="text" id="vida">
                    </div>
                    <div>
                        <p>Defesa</p>
                        <input type="text" id="defesa">
                    </div>
                    <div>
                        <p>Velocidade</p>
                        <input type="text" id="velocidade">
                    </div>
                </div>

                <div>
                    <img src="" alt="">
                </div>
            </div>

            <div>
                <h2>Biografia</h2>
                <textarea name="" id="biografia" cols="30" rows="25"></textarea>
            </div>
            <div>
                <h2>Equipamentos</h2>
                <textarea name="" id="equipamentos" cols="30" rows="25"></textarea>
            </div>
            <div>
                <h2>Características</h2>
                <textarea name="" id="caracteristicas" cols="30" rows="25"></textarea>
            </div>
        </section>
    </main>


</body>

</html>
